<!DOCTYPE html>
<html>
<head>
  <title>Payment Success</title>
    <style>
  :root {
    --bg-start: #0d0b17;
    --bg-end:   #1a1528;
    --card-bg:  rgba(255, 255, 255, 0.08);
    --card-hover-bg: rgba(255, 255, 255, 0.12);
    --primary:  #6e44ff;
    --secondary: #ff4d94;
    --text:     #e0d7ff;
    --text-light: #f8f5ff;
    --accent:   #00e0b0;
    --shadow:   rgba(0, 0, 0, 0.4);
  }

  body {
    margin: 0;
    padding: 2rem;
    font-family: 'Inter', 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top right, var(--bg-start), var(--bg-end));
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
  }

  .payment-card {
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    box-shadow: 0 12px 40px var(--shadow);
    padding: 2rem 3rem;
    max-width: 420px;
    width: 100%;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .payment-card:hover {
    transform: translateY(-8px);
    background: var(--card-hover-bg);
    box-shadow: 0 16px 50px rgba(0, 0, 0, 0.5);
  }

  .payment-card h1 {
    font-size: 2.8rem;
    margin: 0 0 1rem;
    background: linear-gradient(90deg, var(--text-light), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
  }

  .payment-card p {
    font-size: 1.1rem;
    line-height: 1.6;
    margin-bottom: 2rem;
    color: var(--text-light);
  }

  .payment-card .btn-back {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: linear-gradient(45deg, var(--primary), var(--secondary));
    color: var(--text-light);
    padding: 0.75rem 1.8rem;
    border-radius: 50px;
    font-weight: 600;
    text-decoration: none;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 8px 24px rgba(110, 68, 255, 0.3);
  }

  .payment-card .btn-back:hover {
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 12px 32px rgba(255, 77, 148, 0.4);
  }
</style>

</head>
<body>
  <div class="payment-card">
    <h1>Thank you!</h1>
    <p>Your payment was successful.</p>
    <a href="/" class="btn-back">← Back to Shopping</a>
  </div>
</body>
</html>
